services:
  - type: web
    name: atlas-bank-backend
    runtime: php
    buildCommand: |
      # No build step needed for PHP — Apache serves files directly.
      # Ensure storage directory exists for rate-limit file fallback.
      mkdir -p storage/rate_limits
      chmod 750 storage/rate_limits
    startCommand: echo "Atlas Bank Backend ready"
    plan: free
    # The .htaccess file handles URL rewriting for /api/* routes.
    # The frontend HTML file is served from the project root as well.
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_SCHEMA
        value: atlas_bank_schema
      - key: DB_SSLMODE
        value: require
      - key: SESSION_LIFETIME
        value: "480"
      - key: SESSION_NAME
        value: ATLAS_BANK_SESSION
      - key: JWT_SECRET
        sync: false
      - key: DATA_ENCRYPTION_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
